<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小苏的内容项目工作台</title>
  <style>
    :root {
      --bg:#f7f2e8; --bg2:#eee5d6; --panel:#fffaf0; --panel2:#fffdf8;
      --text:#1f2723; --muted:#7a756a; --soft:#9a9385; --line:rgba(31,39,35,.12);
      --olive:#526044; --blue:#516d82; --ochre:#c88b3d; --brick:#af5c45;
      --shadow:0 10px 28px rgba(62,54,39,.09); --shadow-strong:0 22px 64px rgba(62,54,39,.12);
      --radius:16px; --radius-xl:22px; --sidebar:360px; --unit:74px; --row-h:92px; --units:35;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{color-scheme:light}
    body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at 10% 12%,rgba(200,139,61,.08),transparent 28%),radial-gradient(circle at 88% 18%,rgba(81,109,130,.08),transparent 26%),linear-gradient(135deg,var(--bg),var(--bg2));padding-bottom:40px;overflow-x:hidden}
    body.modal-open,body.is-dragging{overflow:hidden} body.is-dragging{user-select:none;cursor:grabbing}
    button,input,select,textarea{font:inherit} button{color:inherit}
    :focus-visible{outline:3px solid rgba(81,109,130,.28);outline-offset:2px}

    .topbar{position:sticky;top:0;z-index:90;background:#fffaf0;border-bottom:1px solid var(--line)}
    .topbar-inner{max-width:1600px;margin:auto;padding:14px 30px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .brand{display:flex;align-items:center;gap:12px}.brand-mark{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;color:#fff;background:var(--olive);box-shadow:0 10px 24px rgba(82,96,68,.2);font-weight:800}.brand h1{font-size:20px;line-height:1;font-weight:850;letter-spacing:-.04em}.brand p{margin-top:5px;color:var(--muted);font-size:12px}
    .actions,.controls,.view-nav{display:flex;align-items:center;gap:9px;flex-wrap:wrap}.actions{justify-content:flex-end}
    .btn{height:38px;padding:0 16px;border:1px solid var(--line);border-radius:999px;background:var(--panel);font-size:13px;font-weight:750;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,background .15s ease}.btn:hover{transform:translateY(-1px);background:#fff;box-shadow:var(--shadow)}.btn.primary{border-color:transparent;background:var(--olive);color:#fff}.btn.danger{border-color:transparent;background:var(--brick);color:#fff}.btn.small{height:30px;padding:0 10px;font-size:12px}.btn.icon{width:34px;padding:0;display:grid;place-items:center}

    .page{max-width:1600px;margin:auto;padding:20px 30px 0}.monitor{display:grid;grid-template-columns:repeat(6,minmax(126px,1fr));gap:12px;margin-bottom:16px}.monitor-card{position:relative;min-height:98px;padding:15px;border:1px solid var(--line);border-radius:18px;background:var(--panel);text-align:left;box-shadow:var(--shadow);cursor:pointer;overflow:hidden;transition:transform .15s ease,border-color .15s ease}.monitor-card::after{content:"";position:absolute;width:104px;height:104px;right:-35px;bottom:-50px;border-radius:50%;background:var(--c);opacity:.1}.monitor-card:hover,.monitor-card.active{transform:translateY(-2px);border-color:rgba(82,96,68,.3)}.monitor-card.active::after{opacity:.2}.monitor-label{color:var(--muted);font-size:13px;font-weight:800}.monitor-value{margin-top:7px;font-size:31px;line-height:1;font-weight:850}.monitor-note{margin-top:6px;color:var(--soft);font-size:12px;line-height:1.35}

    .main-grid{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:18px;align-items:start}.workspace,.today-panel{border:1px solid var(--line);border-radius:var(--radius-xl);background:var(--panel);box-shadow:var(--shadow-strong);overflow:hidden}.workspace-head{padding:17px 20px;display:grid;grid-template-columns:minmax(220px,1fr) auto;align-items:center;gap:16px;border-bottom:1px solid var(--line)}.workspace-head h2{font-size:22px;letter-spacing:-.05em}.workspace-head p{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.45}.controls{justify-content:flex-end}.segmented,.zoom-panel,.view-nav{padding:4px;border:1px solid var(--line);border-radius:999px;background:var(--panel2)}.segmented{display:flex;gap:3px}.segmented button{height:30px;min-width:40px;padding:0 9px;border:0;border-radius:999px;background:transparent;color:var(--muted);font-size:12px;font-weight:800;cursor:pointer}.segmented button.active{background:var(--blue);color:#fff}.zoom-panel{display:flex;align-items:center;gap:7px;padding:7px}.zoom-panel label{font-size:12px;color:var(--muted);font-weight:800;white-space:nowrap}.zoom-btn{width:28px;height:28px;border:0;border-radius:50%;background:rgba(31,39,35,.05);cursor:pointer;font-weight:800}.zoom-range{width:92px;accent-color:var(--blue)}.zoom-text{min-width:38px;font-size:12px;color:var(--muted);font-weight:800;text-align:right}.view-nav .btn{border:0;background:transparent;box-shadow:none}.view-nav .btn:hover{background:rgba(31,39,35,.05);transform:none}

    .gantt-scroll{position:relative;overflow:auto;max-height:68vh;scroll-behavior:auto;overscroll-behavior:contain;cursor:grab}.gantt-scroll.panning{cursor:grabbing}.gantt-content{width:calc(var(--sidebar) + var(--units) * var(--unit));min-width:100%;position:relative}.timeline{position:sticky;top:0;z-index:40;display:grid;grid-template-columns:var(--sidebar) repeat(var(--units),var(--unit));height:58px;background:var(--panel);border-bottom:1px solid var(--line)}.timeline-corner{position:sticky;left:0;z-index:42;padding:17px 18px;border-right:1px solid var(--line);background:var(--panel);color:var(--olive);font-size:12px;font-weight:850}.unit-cell{height:58px;padding:8px 4px;text-align:center;border:0;border-right:1px solid rgba(31,39,35,.06);background:transparent;cursor:pointer}.unit-cell:hover{background:rgba(81,109,130,.05)}.unit-cell.today{background:rgba(81,109,130,.08)}.unit-main{display:inline-grid;place-items:center;min-width:30px;height:28px;padding:0 7px;border-radius:999px;font-size:13px;font-weight:850}.unit-cell.today .unit-main{background:var(--blue);color:#fff;box-shadow:0 6px 18px rgba(81,109,130,.25)}.unit-sub{display:block;margin-top:2px;color:var(--soft);font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .project-row{display:grid;grid-template-columns:var(--sidebar) calc(var(--units) * var(--unit));height:var(--row-h);border-bottom:1px solid var(--line)}.project-row:last-child{border-bottom:0}.project-list-cell{position:sticky;left:0;z-index:25;display:flex;align-items:center;padding:9px 12px;border-right:1px solid var(--line);background:var(--panel)}.project-list-card{width:100%;height:calc(var(--row-h) - 18px);padding:11px 13px;border:1px solid var(--line);border-left:3px solid var(--stage-color);border-radius:var(--radius);background:var(--panel2);text-align:left;cursor:pointer;box-shadow:0 4px 14px rgba(62,54,39,.055);transition:background .15s ease,border-color .15s ease}.project-list-card:hover{background:#fff;border-color:rgba(82,96,68,.28)}.project-title{display:block;font-size:14px;line-height:1.3;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.project-meta{display:flex;align-items:center;gap:7px;margin-top:6px;color:var(--muted);font-size:11.5px;white-space:nowrap;overflow:hidden}.priority-badge{display:inline-flex;align-items:center;height:19px;padding:0 7px;border-radius:999px;color:#fff;background:var(--priority-color);font-size:10.5px;font-weight:850;flex:none}.stage-dot{display:inline-flex;align-items:center;gap:4px;font-weight:750;min-width:0;overflow:hidden;text-overflow:ellipsis}.stage-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--stage-color);flex:none}.project-progress{height:5px;margin-top:8px;border-radius:99px;background:rgba(31,39,35,.08);overflow:hidden}.project-progress span{display:block;height:100%;width:var(--progress);border-radius:inherit;background:var(--stage-color)}

    .project-lane{position:relative;width:calc(var(--units) * var(--unit));height:var(--row-h);background:repeating-linear-gradient(90deg,transparent 0,transparent calc(var(--unit) - 1px),rgba(31,39,35,.055) calc(var(--unit) - 1px),rgba(31,39,35,.055) var(--unit));overflow:hidden}.project-lane::before{content:"";position:absolute;inset:0 auto 0 calc(var(--today-index) * var(--unit));width:var(--unit);background:rgba(200,139,61,.09);pointer-events:none}.gantt-bar{position:absolute;left:var(--bar-left);top:50%;width:var(--bar-width);height:58px;min-width:18px;transform:translateY(-50%);display:grid;grid-template-rows:auto 1fr auto;align-content:center;gap:3px;padding:8px 18px;border:0;border-radius:18px;background:var(--bar-color);color:#fffaf0;box-shadow:0 8px 22px rgba(49,43,28,.16);overflow:hidden;cursor:grab;touch-action:none;user-select:none;z-index:6;transition:box-shadow .15s ease,filter .15s ease;container-type:inline-size}.gantt-bar:hover{box-shadow:0 12px 30px rgba(49,43,28,.23);filter:saturate(1.03)}.gantt-bar.dragging{cursor:grabbing;z-index:50;box-shadow:0 18px 42px rgba(49,43,28,.28);transition:none;filter:none}.gantt-bar.invalid{outline:3px solid rgba(175,92,69,.45)}.bar-stage-tag{display:inline-flex;align-items:center;justify-self:start;max-width:100%;height:16px;padding:0 6px;border-radius:999px;background:rgba(255,250,240,.16);color:rgba(255,250,240,.82);font-size:9.5px;font-weight:760;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar-title{display:block;min-width:0;max-width:100%;align-self:center;font-size:13px;line-height:1.18;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fffaf0}.bar-meta{display:grid;grid-template-columns:minmax(0,1fr) 38px;align-items:center;gap:8px;min-width:0;color:rgba(255,250,240,.82);font-size:10.5px;font-weight:750;line-height:1.1;white-space:nowrap}.bar-date{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar-percent{width:38px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}.bar-progress{position:absolute;left:18px;right:18px;bottom:7px;height:3px;border-radius:99px;background:rgba(255,255,255,.24);overflow:hidden;pointer-events:none}.bar-progress span{display:block;height:100%;width:var(--progress);background:rgba(255,255,255,.9)}@container (max-width: 210px){.bar-stage-tag{display:none}.gantt-bar{grid-template-rows:1fr auto;padding-top:10px}.bar-title{font-size:12.5px}.bar-meta{font-size:10px}}@container (max-width: 145px){.bar-stage-tag,.bar-meta,.bar-progress{display:none}.gantt-bar{grid-template-rows:1fr;padding:0 16px}.bar-title{align-self:center;font-size:12px;line-height:58px}}@container (max-width: 72px){.bar-stage-tag,.bar-title,.bar-meta,.bar-progress{display:none}.gantt-bar{padding:0 12px;border-radius:16px}}.resize-handle{position:absolute;top:0;bottom:0;width:12px;min-width:12px;z-index:3;cursor:ew-resize;background:rgba(255,255,255,.16);opacity:.32}.resize-handle.left{left:0;border-radius:18px 0 0 18px}.resize-handle.right{right:0;border-radius:0 18px 18px 0}.gantt-bar:hover .resize-handle,.gantt-bar:focus-visible .resize-handle{opacity:.7}.edge-marker{position:absolute;top:50%;transform:translateY(-50%);height:42px;min-width:42px;padding:0 9px;border:0;border-radius:999px;background:var(--bar-color);color:#fff;font-weight:850;cursor:pointer;box-shadow:0 8px 20px rgba(49,43,28,.16)}.edge-marker.left{left:8px}.edge-marker.right{right:8px}.empty-state{padding:34px 20px;text-align:center;color:var(--muted);font-size:13px}

    .today-panel{position:sticky;top:82px}.today-head{padding:18px 18px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:8px}.today-head h2{font-size:15px;letter-spacing:.03em}.today-head p{margin-top:5px;color:var(--muted);font-size:12px}.today-date{margin:14px 16px 0;padding:16px;border-radius:16px;background:var(--olive);color:#fffaf0}.today-date strong{display:block;margin-top:5px;font-family:Georgia,"Songti SC",serif;font-size:31px;font-weight:500}.task-list{padding:14px 16px 18px;display:grid;gap:10px}.task-item{position:relative;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;padding:12px;border:1px solid var(--line);border-radius:14px;background:var(--panel2)}.task-item.done{opacity:.55}.task-item input{margin-top:3px;accent-color:var(--olive)}.task-text{min-width:0}.task-text strong{display:block;font-size:12.5px;line-height:1.45}.task-text span{display:block;margin-top:4px;color:var(--muted);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.task-actions{display:flex;gap:3px}.task-action{width:25px;height:25px;border:0;border-radius:8px;background:transparent;color:var(--muted);cursor:pointer}.task-action:hover{background:rgba(31,39,35,.06);color:var(--text)}.task-empty{padding:22px;text-align:center;color:var(--muted);font-size:13px}

    .modal-overlay{position:fixed;inset:0;z-index:130;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(31,39,35,.32)}.modal-overlay.active{display:flex}.modal{width:min(760px,100%);max-height:min(90vh,920px);overflow:auto;padding:24px;border:1px solid var(--line);border-radius:20px;background:var(--panel);box-shadow:var(--shadow-strong);animation:modalIn .18s ease both}@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.modal-head h3{font-size:21px;letter-spacing:-.04em}.close{width:34px;height:34px;border:0;border-radius:50%;background:rgba(31,39,35,.06);cursor:pointer;font-size:18px}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px 14px}.field{display:grid;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:12px;color:var(--muted);font-weight:800}.field input,.field select,.field textarea{width:100%;min-height:41px;padding:9px 11px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);outline:none}.field textarea{min-height:78px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(81,109,130,.42);box-shadow:0 0 0 4px rgba(81,109,130,.1)}.inline-check{display:flex;align-items:center;gap:9px;min-height:41px;padding:9px 11px;border:1px solid var(--line);border-radius:12px;background:#fff}.inline-check input{width:auto;min-height:auto;accent-color:var(--olive)}.section-title{grid-column:1/-1;margin-top:4px;padding-top:14px;border-top:1px solid var(--line);font-size:14px;font-weight:850}.details-box{grid-column:1/-1;border:1px solid var(--line);border-radius:14px;background:var(--panel2);overflow:hidden}.details-box summary{padding:13px 14px;cursor:pointer;font-size:13px;font-weight:850}.details-inner{padding:0 14px 14px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px 14px}.file-list{display:flex;flex-wrap:wrap;gap:7px}.file-chip{padding:6px 9px;border-radius:999px;background:rgba(81,109,130,.08);color:var(--blue);font-size:11.5px;font-weight:800}.modal-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px}.confirm-body{line-height:1.7;font-size:14px}.confirm-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}.summary-list,.stage-list{display:grid;gap:9px}.summary-card,.stage-item{padding:12px 13px;border:1px solid var(--line);border-radius:13px;background:var(--panel2)}.summary-card{width:100%;text-align:left;cursor:pointer}.summary-card strong{display:block;font-size:13px}.summary-card span{display:block;margin-top:4px;color:var(--muted);font-size:11.5px}.stage-item{display:flex;align-items:center;gap:9px;cursor:grab}.stage-item.dragging{opacity:.45}.stage-item.drag-over{border-color:rgba(82,96,68,.4);background:rgba(82,96,68,.05)}.drag-handle{color:var(--soft);font-size:16px}.stage-color{width:34px;height:30px;border:1px solid var(--line);border-radius:9px;padding:2px;background:none}.stage-name{flex:1;min-width:0;border:0;background:transparent;font-weight:800;outline:none}.stage-count{font-size:11.5px;color:var(--muted)}.stage-add{display:flex;gap:8px;margin-top:14px}.stage-add input[type=text]{flex:1;min-width:0;padding:9px 11px;border:1px solid var(--line);border-radius:11px}.stage-add input[type=color]{width:42px;border:1px solid var(--line);border-radius:10px;padding:2px;background:none}.toast{position:fixed;left:50%;bottom:22px;z-index:180;transform:translate(-50%,18px);opacity:0;pointer-events:none;padding:10px 15px;border-radius:999px;background:rgba(31,39,35,.9);color:#fff;font-size:13px;font-weight:800;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,0)}

    @media(max-width:1240px){.main-grid{grid-template-columns:1fr}.today-panel{position:static}.gantt-scroll{max-height:62vh}}
    @media(max-width:1120px){:root{--sidebar:250px}.monitor{grid-template-columns:repeat(3,1fr)}.workspace-head{grid-template-columns:1fr}.controls{justify-content:flex-start}}
    @media(max-width:760px){:root{--sidebar:210px}.topbar-inner,.page{padding-left:14px;padding-right:14px}.topbar-inner{align-items:flex-start;flex-direction:column}.actions{width:100%;justify-content:flex-start}.monitor{grid-template-columns:repeat(2,1fr)}.form-grid,.details-inner{grid-template-columns:1fr}.field.full,.section-title,.details-box{grid-column:1}.workspace-head{padding:16px}.zoom-panel label{display:none}.zoom-range{width:70px}}
  </style>
</head>
<body>
<header class="topbar"><div class="topbar-inner"><div class="brand"><div class="brand-mark">苏</div><div><h1>小苏的内容项目工作台</h1><p>用甘特图管理选题、脚本、拍摄、剪辑和发布</p></div></div><div class="actions"><button class="btn" id="showAllBtn" type="button">显示全部</button><button class="btn" id="stageBtn" type="button">管理阶段</button><button class="btn" id="resetBtn" type="button">重置演示数据</button><button class="btn primary" id="createBtn" type="button">新增项目</button></div></div></header>
<main class="page">
  <section class="monitor" id="monitor"></section>
  <div class="main-grid">
    <section class="workspace" id="workspace">
      <div class="workspace-head"><div><h2>内容项目甘特图</h2><p>项目按优先级排列；拖动甘特条调整开始时间，拖动两侧调整周期。</p></div><div class="controls">
        <div class="segmented" id="scaleTabs"><button type="button" data-scale="day">日</button><button type="button" data-scale="week">周</button><button type="button" data-scale="month">月</button><button type="button" data-scale="year">年</button></div>
        <div class="view-nav"><button class="btn icon" id="prevViewBtn" type="button" aria-label="上一时间段">‹</button><button class="btn small" id="todayViewBtn" type="button">今天</button><button class="btn icon" id="nextViewBtn" type="button" aria-label="下一时间段">›</button></div>
        <div class="zoom-panel"><label>横向</label><button class="zoom-btn" id="zoomOutBtn" type="button">−</button><input class="zoom-range" id="zoomRange" type="range" min="44" max="120" value="74"><button class="zoom-btn" id="zoomInBtn" type="button">＋</button><span class="zoom-text" id="zoomText">100%</span></div>
        <div class="zoom-panel"><label>纵向</label><button class="zoom-btn" id="vZoomOutBtn" type="button">−</button><input class="zoom-range" id="vZoomRange" type="range" min="82" max="136" value="92"><button class="zoom-btn" id="vZoomInBtn" type="button">＋</button><span class="zoom-text" id="vZoomText">100%</span></div>
      </div></div>
      <div class="gantt-scroll" id="ganttScroll"><div class="gantt-content" id="ganttContent"><div class="timeline" id="timeline"></div><div id="projectRows"></div></div></div>
    </section>
    <aside class="today-panel"><div class="today-head"><div><h2>今日待处理</h2><p>完成任务后同步更新项目进度</p></div><button class="btn small" id="quickTaskBtn" type="button">添加</button></div><div class="today-date"><span id="weekday"></span><strong id="todayText"></strong></div><div class="task-list" id="taskList"></div></aside>
  </div>
</main>

<div class="modal-overlay" id="projectModal"><div class="modal" role="dialog" aria-modal="true" aria-labelledby="projectModalTitle"><div class="modal-head"><h3 id="projectModalTitle">新增项目</h3><button class="close" type="button" data-close="projectModal">×</button></div><div class="form-grid">
  <div class="field full"><label for="titleInput">项目标题</label><input id="titleInput" maxlength="80"></div>
  <div class="field full"><label for="descInput">项目描述</label><textarea id="descInput" maxlength="500"></textarea></div>
  <div class="field"><label for="statusInput">当前阶段</label><select id="statusInput"></select></div><div class="field"><label for="ownerInput">负责人</label><input id="ownerInput" maxlength="30"></div>
  <div class="field"><label for="startInput">开始日期</label><input id="startInput" type="date"></div><div class="field"><label for="durationInput">持续天数</label><input id="durationInput" type="number" min="1" max="3650"></div>
  <div class="field"><label for="progressInput">当前进度</label><input id="progressInput" type="number" min="0" max="100"></div><div class="field"><label for="priorityInput">优先级</label><select id="priorityInput"><option>高</option><option>中</option><option>低</option></select></div>
  <div class="section-title">今日待处理</div><div class="field"><label>任务设置</label><label class="inline-check"><input id="addTaskInput" type="checkbox">加入指定日期的待处理事项</label></div><div class="field"><label for="taskDateInput">任务日期</label><input id="taskDateInput" type="date"></div><div class="field full"><label for="taskTextInput">待处理事项</label><input id="taskTextInput" maxlength="120" placeholder="例如：确认最终脚本和录制计划"></div>
  <details class="details-box"><summary>更多资料与文件归档</summary><div class="details-inner"><div class="field full"><label for="backgroundInput">项目背景资料</label><textarea id="backgroundInput"></textarea></div><div class="field full"><label for="copyInput">项目文案</label><textarea id="copyInput"></textarea></div><div class="field full"><label for="materialLinksInput">素材链接</label><textarea id="materialLinksInput"></textarea></div><div class="field"><label for="baiduInput">成片网盘链接</label><input id="baiduInput"></div><div class="field"><label for="coverInput">封面文件或链接</label><input id="coverInput"></div><div class="field full"><label for="fileInput">上传项目文件（仅记录文件名）</label><input id="fileInput" type="file" multiple><div class="file-list" id="fileList"></div></div></div></details>
</div><div class="modal-actions"><button class="btn danger" id="deleteProjectBtn" type="button">删除项目</button><div class="actions"><button class="btn" type="button" data-close="projectModal">取消</button><button class="btn primary" id="saveProjectBtn" type="button">保存</button></div></div></div></div>

<div class="modal-overlay" id="taskModal"><div class="modal" style="max-width:520px" role="dialog" aria-modal="true"><div class="modal-head"><h3 id="taskModalTitle">添加待处理事项</h3><button class="close" type="button" data-close="taskModal">×</button></div><div class="form-grid"><div class="field full"><label for="taskProjectSelect">关联项目</label><select id="taskProjectSelect"></select></div><div class="field full"><label for="taskEditText">事项内容</label><input id="taskEditText" maxlength="120"></div><div class="field"><label for="taskEditDate">日期</label><input id="taskEditDate" type="date"></div><div class="field"><label for="taskDeltaInput">完成后增加进度</label><input id="taskDeltaInput" type="number" min="0" max="100" value="8"></div></div><div class="modal-actions"><button class="btn danger" id="deleteTaskBtn" type="button">删除事项</button><div class="actions"><button class="btn" type="button" data-close="taskModal">取消</button><button class="btn primary" id="saveTaskBtn" type="button">保存</button></div></div></div></div>

<div class="modal-overlay" id="stageModal"><div class="modal" style="max-width:520px" role="dialog" aria-modal="true"><div class="modal-head"><h3>管理项目阶段</h3><button class="close" type="button" data-close="stageModal">×</button></div><div class="stage-list" id="stageList"></div><div class="stage-add"><input id="newStageName" type="text" placeholder="新阶段名称"><input id="newStageColor" type="color" value="#526044"><button class="btn primary" id="addStageBtn" type="button">添加</button></div></div></div>
<div class="modal-overlay" id="summaryModal"><div class="modal" style="max-width:620px" role="dialog" aria-modal="true"><div class="modal-head"><h3 id="summaryTitle">项目总结</h3><button class="close" type="button" data-close="summaryModal">×</button></div><div class="summary-list" id="summaryList"></div></div></div>
<div class="modal-overlay" id="confirmModal"><div class="modal" style="max-width:430px" role="dialog" aria-modal="true"><div class="modal-head"><h3 id="confirmTitle">确认</h3><button class="close" type="button" data-close="confirmModal">×</button></div><div class="confirm-body" id="confirmBody"></div><div class="confirm-actions"><button class="btn" type="button" data-close="confirmModal">取消</button><button class="btn danger" id="confirmOkBtn" type="button">确认</button></div></div></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(() => {
  'use strict';
  const DATA_VERSION = 6;
  const STORAGE_KEY = 'xiaosu-content-workbench-v6';
  const LEGACY_KEYS = ['xiaosu-workbench-v5','xiaosu-workbench-v4','xiaosu-workbench-v3','xiaosu-content-project-dashboard-v2'];
  const PRIORITY_WEIGHT = { '高':0, '中':1, '低':2 };
  const $ = id => document.getElementById(id);
  const todayDate = stripTime(new Date());
  const todayISO = toISO(todayDate);
  const weekNames = ['周日','周一','周二','周三','周四','周五','周六'];

  let stages = [], projects = [], tasks = [];
  let currentFilter = 'all', currentScale = 'day', zoomValue = 74, vZoomValue = 92;
  let editingProjectId = null, editingProjectTaskId = null, editingTaskId = null, pendingFiles = [], confirmAction = null;
  let modalStack = [], activeDrag = null, dragRaf = 0, lastPointerX = 0, lastPointerY = 0;
  const viewStarts = {};

  const els = {
    monitor:$('monitor'), timeline:$('timeline'), rows:$('projectRows'), ganttScroll:$('ganttScroll'), ganttContent:$('ganttContent'), taskList:$('taskList'),
    scaleTabs:$('scaleTabs'), zoomRange:$('zoomRange'), zoomText:$('zoomText'), vZoomRange:$('vZoomRange'), vZoomText:$('vZoomText'), toast:$('toast'),
    projectModal:$('projectModal'), taskModal:$('taskModal'), stageModal:$('stageModal'), summaryModal:$('summaryModal'), confirmModal:$('confirmModal')
  };
  const inputs = {
    title:$('titleInput'), desc:$('descInput'), status:$('statusInput'), owner:$('ownerInput'), start:$('startInput'), duration:$('durationInput'), progress:$('progressInput'), priority:$('priorityInput'),
    addTask:$('addTaskInput'), taskDate:$('taskDateInput'), taskText:$('taskTextInput'), background:$('backgroundInput'), copy:$('copyInput'), materialLinks:$('materialLinksInput'), baidu:$('baiduInput'), cover:$('coverInput'), file:$('fileInput')
  };

  function stripTime(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function parseISO(iso){ if(!/^\d{4}-\d{2}-\d{2}$/.test(String(iso||''))) return stripTime(new Date()); const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d); }
  function toISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function dateSerial(d){ return Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())/86400000; }
  function daysBetween(a,b){ return Math.round(dateSerial(b)-dateSerial(a)); }
  function addDays(d,n){ const x=new Date(d.getFullYear(),d.getMonth(),d.getDate()); x.setDate(x.getDate()+n); return x; }
  function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
  function addMonthsSafe(d,n){ const y=d.getFullYear(), m=d.getMonth()+n, day=d.getDate(); const first=new Date(y,m,1); first.setDate(Math.min(day,daysInMonth(first.getFullYear(),first.getMonth()))); return first; }
  function addYearsSafe(d,n){ const y=d.getFullYear()+n,m=d.getMonth(),day=d.getDate(); return new Date(y,m,Math.min(day,daysInMonth(y,m))); }
  function startOfWeek(d){ const x=stripTime(d); x.setDate(x.getDate()-((x.getDay()+6)%7)); return x; }
  function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
  function escapeHTML(v){ return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
  function uid(prefix){ return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`; }
  function formatDate(iso){ const d=parseISO(iso); return `${d.getMonth()+1}/${d.getDate()}`; }
  function projectEnd(p){ return addDays(parseISO(p.start), Math.max(1,Number(p.duration)||1)-1); }
  function contributedForProject(id){ return tasks.filter(t=>t.projectId===id&&t.contributed).reduce((s,t)=>s+(Number(t.progressDelta)||0),0); }
  function projectProgress(p){ return clamp((Number(p.baseProgress)||0)+contributedForProject(p.id),0,100); }
  function setProjectDisplayedProgress(p,target){ p.baseProgress=clamp((Number(target)||0)-contributedForProject(p.id),-10000,100); }

  function defaultStages(){ return [
    {id:'topic',name:'选题策划',color:'#516d82',order:0},{id:'script',name:'脚本撰写',color:'#c88b3d',order:1},{id:'shoot',name:'拍摄中',color:'#526044',order:2},{id:'edit',name:'后期剪辑',color:'#af5c45',order:3},{id:'publish',name:'已发布',color:'#6b8e7f',order:4}
  ]; }
  function defaultData(){
    const created = Date.now()-5000;
    const ps=[
      {id:'p1',title:'AI工具测评视频',desc:'对比评测主流AI工具，给创作者选择指南',status:'script',start:toISO(addDays(todayDate,1)),duration:7,baseProgress:68,owner:'小苏',priority:'高',createdAt:created+1},
      {id:'p2',title:'新产品体验视频',desc:'等待样机到位，先完成体验维度和镜头清单',status:'edit',start:todayISO,duration:6,baseProgress:42,owner:'小苏',priority:'中',createdAt:created+2},
      {id:'p3',title:'客户方案提报',desc:'框架已定稿，需要补充预算页和执行排期',status:'script',start:toISO(addDays(todayDate,-1)),duration:5,baseProgress:76,owner:'林',priority:'高',createdAt:created+3},
      {id:'p4',title:'外出拍摄',desc:'确认场地、交通与备用天气方案',status:'shoot',start:toISO(addDays(todayDate,6)),duration:4,baseProgress:28,owner:'林',priority:'低',createdAt:created+4},
      {id:'p5',title:'月度选题整理',desc:'已汇总初版，按投入产出比排序',status:'topic',start:toISO(addDays(todayDate,-3)),duration:8,baseProgress:55,owner:'小苏',priority:'中',createdAt:created+5}
    ].map(p=>({...p,background:'',copy:'',materialLinks:'',baidu:'',cover:'',files:[]}));
    const ts=[
      ['p1','确认 AI工具测评视频的最终脚本和录制计划',12],['p2','整理新产品体验视频的镜头清单',10],['p3','补齐客户方案提报的预算与排期页',8],['p4','给外出拍摄确认场地备选方案',10],['p5','月度选题按投入产出比排序并确认',10]
    ].map((x,i)=>({id:`t${i+1}`,projectId:x[0],text:x[1],date:todayISO,done:false,contributed:false,progressDelta:x[2],createdAt:created+100+i}));
    return {version:DATA_VERSION,stages:defaultStages(),projects:ps,tasks:ts};
  }

  function normalizeStage(s,i){ return {id:String(s?.id||uid('stage')),name:String(s?.name||'未命名阶段'),color:String(s?.color||s?.c1||'#526044'),order:Number.isFinite(Number(s?.order))?Number(s.order):i}; }
  function normalizeTask(t,i){ return {id:String(t?.id||uid('task')),projectId:String(t?.projectId||''),text:String(t?.text||'待处理事项'),date:/^\d{4}-\d{2}-\d{2}$/.test(t?.date||'')?t.date:todayISO,done:!!t?.done,contributed:!!t?.contributed,progressDelta:clamp(Number(t?.progressDelta)||8,0,100),createdAt:Number(t?.createdAt)||Date.now()+i}; }
  function normalizeProject(p,i,taskList){
    const id=String(p?.id||uid('project')); const contrib=taskList.filter(t=>t.projectId===id&&t.contributed).reduce((s,t)=>s+t.progressDelta,0);
    const shown=clamp(Number(p?.progress ?? p?.baseProgress ?? 0),0,100);
    const base = p?.baseProgress!==undefined ? Number(p.baseProgress)||0 : shown-contrib;
    return {id,title:String(p?.title||'未命名项目'),desc:String(p?.desc||''),status:String(p?.status||'topic'),start:/^\d{4}-\d{2}-\d{2}$/.test(p?.start||'')?p.start:todayISO,duration:clamp(Number(p?.duration)||1,1,3650),baseProgress:clamp(base,-10000,100),owner:String(p?.owner||'小苏'),priority:['高','中','低'].includes(p?.priority)?p.priority:'中',createdAt:Number(p?.createdAt)||Date.now()+i,background:String(p?.background||''),copy:String(p?.copy||''),materialLinks:String(p?.materialLinks||''),baidu:String(p?.baidu||''),cover:String(p?.cover||''),files:Array.isArray(p?.files)?p.files.map(String):[]};
  }
  function validateRelations(){
    stages.sort((a,b)=>a.order-b.order).forEach((s,i)=>s.order=i); if(!stages.length) stages=defaultStages();
    const stageIds=new Set(stages.map(s=>s.id)); projects.forEach(p=>{if(!stageIds.has(p.status))p.status=stages[0].id});
    const projectIds=new Set(projects.map(p=>p.id)); tasks=tasks.filter(t=>projectIds.has(t.projectId));
  }
  function loadData(){
    let raw=null,source=null;
    try{ raw=localStorage.getItem(STORAGE_KEY); source=STORAGE_KEY; if(!raw){ for(const key of LEGACY_KEYS){ const v=localStorage.getItem(key); if(v){raw=v;source=key;break;} } } }catch{}
    if(!raw){ applyData(defaultData()); saveData(); return; }
    try{ const data=JSON.parse(raw); const taskList=Array.isArray(data.tasks)?data.tasks.map(normalizeTask):[]; stages=(Array.isArray(data.stages)?data.stages:defaultStages()).map(normalizeStage); tasks=taskList; projects=(Array.isArray(data.projects)?data.projects:defaultData().projects).map((p,i)=>normalizeProject(p,i,taskList)); validateRelations(); if(source!==STORAGE_KEY||data.version!==DATA_VERSION)saveData(); }
    catch{ applyData(defaultData()); saveData(); }
  }
  function applyData(d){ stages=d.stages.map(normalizeStage); tasks=d.tasks.map(normalizeTask); projects=d.projects.map((p,i)=>normalizeProject(p,i,tasks)); validateRelations(); }
  function saveData(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify({version:DATA_VERSION,stages,projects,tasks})); }catch{ showToast('本地存储失败，请检查浏览器权限'); } }

  function initViewStarts(){ viewStarts.day=addDays(todayDate,-3); viewStarts.week=addDays(startOfWeek(todayDate),-14); viewStarts.month=new Date(todayDate.getFullYear(),0,1); viewStarts.year=new Date(todayDate.getFullYear()-2,0,1); }
  function scaleConfig(){ return {day:{units:35},week:{units:18},month:{units:12},year:{units:5}}[currentScale]; }
  function unitStart(i){ const s=viewStarts[currentScale]; if(currentScale==='day')return addDays(s,i); if(currentScale==='week')return addDays(s,i*7); if(currentScale==='month')return addMonthsSafe(s,i); return addYearsSafe(s,i); }
  function unitEnd(i){ const s=unitStart(i); if(currentScale==='day')return s; if(currentScale==='week')return addDays(s,6); if(currentScale==='month')return addDays(addMonthsSafe(s,1),-1); return new Date(s.getFullYear(),11,31); }
  function unitIndexForDate(d){ const s=viewStarts[currentScale]; if(currentScale==='day')return Math.floor(daysBetween(s,d)); if(currentScale==='week')return Math.floor(daysBetween(s,d)/7); if(currentScale==='month')return (d.getFullYear()-s.getFullYear())*12+d.getMonth()-s.getMonth(); return d.getFullYear()-s.getFullYear(); }
  function shiftByUnits(d,n){ if(currentScale==='day')return addDays(d,n); if(currentScale==='week')return addDays(d,n*7); if(currentScale==='month')return addMonthsSafe(d,n); return addYearsSafe(d,n); }
  function getPeriod(i){ const s=unitStart(i),e=unitEnd(i); if(currentScale==='day')return {start:s,end:e,main:s.getDate(),sub:weekNames[s.getDay()],title:`${s.getFullYear()}年${s.getMonth()+1}月${s.getDate()}日`}; if(currentScale==='week')return {start:s,end:e,main:`W${String(getWeekNumber(s)).padStart(2,'0')}`,sub:`${s.getMonth()+1}/${s.getDate()}-${e.getMonth()+1}/${e.getDate()}`,title:`${s.getFullYear()}年第${getWeekNumber(s)}周`}; if(currentScale==='month')return {start:s,end:e,main:`${s.getMonth()+1}月`,sub:String(s.getFullYear()),title:`${s.getFullYear()}年${s.getMonth()+1}月`}; return {start:s,end:e,main:s.getFullYear(),sub:'全年',title:`${s.getFullYear()}年`}; }
  function getWeekNumber(d){ const x=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=x.getUTCDay()||7; x.setUTCDate(x.getUTCDate()+4-day); const y0=new Date(Date.UTC(x.getUTCFullYear(),0,1)); return Math.ceil((((x-y0)/86400000)+1)/7); }
  function visibleRange(p){ const cfg=scaleConfig(),sIdx=unitIndexForDate(parseISO(p.start)),eIdx=unitIndexForDate(projectEnd(p)); if(eIdx<0)return {outside:'left'}; if(sIdx>=cfg.units)return {outside:'right'}; const vs=clamp(sIdx,0,cfg.units-1),ve=clamp(eIdx,0,cfg.units-1); return {outside:null,startIndex:sIdx,endIndex:eIdx,visibleStart:vs,visibleEnd:ve,left:vs*zoomValue,width:Math.max(1,(ve-vs+1)*zoomValue),clippedLeft:sIdx<0,clippedRight:eIdx>=cfg.units}; }

  function stageById(id){ return stages.find(s=>s.id===id)||stages[0]; }
  function priorityColor(p){ return p==='高'? '#af5c45':p==='中'?'#c88b3d':'#526044'; }
  function sortedProjects(){ return projects.filter(p=>currentFilter==='all'||p.status===currentFilter).slice().sort((a,b)=>{ const pw=(PRIORITY_WEIGHT[a.priority]??9)-(PRIORITY_WEIGHT[b.priority]??9); if(pw)return pw; const due=dateSerial(projectEnd(a))-dateSerial(projectEnd(b)); if(due)return due; const st=dateSerial(parseISO(a.start))-dateSerial(parseISO(b.start)); if(st)return st; return (a.createdAt||0)-(b.createdAt||0); }); }

  function render(){ renderMonitor(); renderTimeline(); renderRows(); renderTasks(); renderDate(); renderScaleTabs(); }
  function renderMonitor(){ const items=[{id:'all',name:'全部项目',note:'当前排期总览',color:'#516d82',count:projects.length},...stages.map(s=>({id:s.id,name:s.name,note:stageNote(s),color:s.color,count:projects.filter(p=>p.status===s.id).length}))]; els.monitor.innerHTML=items.map(x=>`<button type="button" class="monitor-card ${currentFilter===x.id?'active':''}" data-filter="${escapeHTML(x.id)}" style="--c:${x.color}"><span class="monitor-label">${escapeHTML(x.name)}</span><div class="monitor-value">${x.count}</div><div class="monitor-note">${escapeHTML(x.note)}</div></button>`).join(''); }
  function stageNote(s){ const map={topic:'灵感、调研和选题方向',script:'结构、分镜和口播文案',shoot:'外拍、补镜头和素材收集',edit:'粗剪、精剪、调色和字幕',publish:'已上线内容和复盘素材'}; return map[s.id]||`${projects.filter(p=>p.status===s.id).length} 个项目`; }
  function renderTimeline(){ const cfg=scaleConfig(); document.documentElement.style.setProperty('--units',cfg.units); const todayIdx=unitIndexForDate(todayDate); document.documentElement.style.setProperty('--today-index',clamp(todayIdx,0,cfg.units-1)); let out='<div class="timeline-corner">项目 / 时间轴</div>'; for(let i=0;i<cfg.units;i++){ const p=getPeriod(i),isToday=todayDate>=p.start&&todayDate<=p.end; out+=`<button type="button" class="unit-cell ${isToday?'today':''}" data-period="${i}"><span class="unit-main">${p.main}</span><span class="unit-sub">${escapeHTML(p.sub)}</span></button>`;} els.timeline.innerHTML=out; }
  function renderRows(){ const list=sortedProjects(); if(!list.length){els.rows.innerHTML='<div class="empty-state">当前筛选条件下没有项目</div>';return;} els.rows.innerHTML=list.map(p=>{ const stage=stageById(p.status),progress=projectProgress(p),due=toISO(projectEnd(p)),range=visibleRange(p); let bar=''; if(range.outside){ bar=`<button type="button" class="edge-marker ${range.outside}" data-locate="${p.id}" style="--bar-color:${stage.color}" title="定位到项目日期">${range.outside==='left'?'←':'→'}</button>`; }else{ bar=`<article class="gantt-bar" tabindex="0" aria-label="${escapeHTML(p.title)}，${escapeHTML(stage.name)}，${progress}%" data-id="${p.id}" data-start-index="${range.startIndex}" data-end-index="${range.endIndex}" style="--bar-left:${range.left}px;--bar-width:${range.width}px;--bar-color:${stage.color};--progress:${progress}%"><span class="resize-handle left" data-resize="left" aria-hidden="true"></span><span class="resize-handle right" data-resize="right" aria-hidden="true"></span><span class="bar-stage-tag">${escapeHTML(stage.name)}</span><span class="bar-title">${escapeHTML(p.title)}</span><div class="bar-meta"><span class="bar-date">${formatDate(p.start)} · ${p.duration}天</span><span class="bar-percent">${progress}%</span></div><div class="bar-progress"><span></span></div></article>`; } return `<div class="project-row" data-project="${p.id}"><div class="project-list-cell"><button type="button" class="project-list-card" data-edit-project="${p.id}" style="--stage-color:${stage.color}"><span class="project-title">${escapeHTML(p.title)}</span><div class="project-meta"><span class="priority-badge" style="--priority-color:${priorityColor(p.priority)}">${p.priority}</span><span class="stage-dot" style="--stage-color:${stage.color}">${escapeHTML(stage.name)}</span><span>截止 ${formatDate(due)}</span><span>${progress}%</span></div><div class="project-progress" style="--progress:${progress}%;--stage-color:${stage.color}"><span></span></div></button></div><div class="project-lane" data-project="${p.id}">${bar}</div></div>`; }).join(''); }
  function renderDate(){ $('weekday').textContent=`今天 · ${weekNames[todayDate.getDay()]}`; $('todayText').textContent=`${todayDate.getMonth()+1}月${todayDate.getDate()}日`; }
  function renderTasks(){ const list=tasks.filter(t=>t.date===todayISO&&projects.some(p=>p.id===t.projectId)).slice().sort((a,b)=>Number(a.done)-Number(b.done)||(a.createdAt||0)-(b.createdAt||0)); if(!list.length){els.taskList.innerHTML='<div class="task-empty">今天还没有待处理事项</div>';return;} els.taskList.innerHTML=list.map(t=>{const p=projects.find(x=>x.id===t.projectId);return `<div class="task-item ${t.done?'done':''}" data-task="${t.id}"><input type="checkbox" ${t.done?'checked':''} aria-label="完成任务"><div class="task-text"><strong>${escapeHTML(t.text)}</strong><span>${escapeHTML(p?.title||'')}</span></div><div class="task-actions"><button type="button" class="task-action" data-edit-task="${t.id}" title="编辑">✎</button><button type="button" class="task-action" data-delete-task="${t.id}" title="删除">×</button></div></div>`}).join(''); }
  function renderScaleTabs(){ els.scaleTabs.querySelectorAll('[data-scale]').forEach(b=>b.classList.toggle('active',b.dataset.scale===currentScale)); }

  function openModal(el){ if(!el.classList.contains('active')){el.classList.add('active');modalStack.push(el);document.body.classList.add('modal-open');} }
  function closeModal(el){el.classList.remove('active');modalStack=modalStack.filter(x=>x!==el);if(!modalStack.length)document.body.classList.remove('modal-open');}
  function showToast(msg){els.toast.textContent=msg;els.toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>els.toast.classList.remove('show'),1700)}
  function showConfirm(title,body,action){$('confirmTitle').textContent=title;$('confirmBody').textContent=body;confirmAction=action;openModal(els.confirmModal)}

  function refreshStageSelects(){ inputs.status.innerHTML=stages.map(s=>`<option value="${s.id}">${escapeHTML(s.name)}</option>`).join(''); $('taskProjectSelect').innerHTML=sortedProjectsForSelect().map(p=>`<option value="${p.id}">${escapeHTML(p.title)}</option>`).join(''); }
  function sortedProjectsForSelect(){return projects.slice().sort((a,b)=>(PRIORITY_WEIGHT[a.priority]??9)-(PRIORITY_WEIGHT[b.priority]??9)||(a.createdAt||0)-(b.createdAt||0));}
  function openCreateProject(){ editingProjectId=null; editingProjectTaskId=null; pendingFiles=[]; $('projectModalTitle').textContent='新增项目'; $('deleteProjectBtn').style.visibility='hidden'; fillProjectForm({title:'',desc:'',status:stages[0].id,owner:'小苏',start:todayISO,duration:3,priority:'中',background:'',copy:'',materialLinks:'',baidu:'',cover:'',files:[]},0,true); openModal(els.projectModal); setTimeout(()=>inputs.title.focus(),50); }
  function openEditProject(id){ const p=projects.find(x=>x.id===id); if(!p)return; editingProjectId=id; pendingFiles=[...p.files]; $('projectModalTitle').textContent='编辑项目'; $('deleteProjectBtn').style.visibility='visible'; const existing=tasks.find(t=>t.projectId===id&&t.date===todayISO); editingProjectTaskId=existing?.id||null; fillProjectForm(p,projectProgress(p),!!existing,existing); openModal(els.projectModal); }
  function fillProjectForm(p,displayProgress,withTask,task){ refreshStageSelects(); inputs.title.value=p.title||'';inputs.desc.value=p.desc||'';inputs.status.value=p.status||stages[0].id;inputs.owner.value=p.owner||'小苏';inputs.start.value=p.start||todayISO;inputs.duration.value=p.duration||3;inputs.progress.value=displayProgress||0;inputs.priority.value=p.priority||'中';inputs.background.value=p.background||'';inputs.copy.value=p.copy||'';inputs.materialLinks.value=p.materialLinks||'';inputs.baidu.value=p.baidu||'';inputs.cover.value=p.cover||'';inputs.file.value='';inputs.addTask.checked=withTask;inputs.taskDate.value=task?.date||todayISO;inputs.taskText.value=task?.text||'';renderFiles(); }
  function renderFiles(){ $('fileList').innerHTML=pendingFiles.length?pendingFiles.map(x=>`<span class="file-chip">${escapeHTML(x)}</span>`).join(''):'<span style="color:var(--soft);font-size:12px">暂无文件</span>'; }
  function saveProject(){ const title=inputs.title.value.trim(); if(!title){showToast('请填写项目标题');inputs.title.focus();return;} const targetProgress=clamp(Number(inputs.progress.value)||0,0,100); let p;
    if(editingProjectId){p=projects.find(x=>x.id===editingProjectId);}else{p={id:uid('project'),createdAt:Date.now(),baseProgress:0};projects.push(p);} Object.assign(p,{title,desc:inputs.desc.value.trim(),status:inputs.status.value,owner:inputs.owner.value.trim()||'小苏',start:inputs.start.value||todayISO,duration:clamp(Number(inputs.duration.value)||1,1,3650),priority:inputs.priority.value,background:inputs.background.value.trim(),copy:inputs.copy.value.trim(),materialLinks:inputs.materialLinks.value.trim(),baidu:inputs.baidu.value.trim(),cover:inputs.cover.value.trim(),files:[...pendingFiles]}); setProjectDisplayedProgress(p,targetProgress);
    const taskDate=inputs.taskDate.value||todayISO;
    let linkedTask=editingProjectTaskId?tasks.find(t=>t.id===editingProjectTaskId):null;
    if(!linkedTask) linkedTask=tasks.find(t=>t.projectId===p.id&&t.date===taskDate);
    if(inputs.addTask.checked){
      const text=inputs.taskText.value.trim()||`推进「${p.title}」的下一步工作`;
      if(linkedTask){ Object.assign(linkedTask,{projectId:p.id,text,date:taskDate}); }
      else { linkedTask={id:uid('task'),projectId:p.id,text,date:taskDate,done:false,contributed:false,progressDelta:8,createdAt:Date.now()}; tasks.push(linkedTask); }
      tasks=tasks.filter(t=>t===linkedTask||!(t.projectId===p.id&&t.date===taskDate));
    }else if(linkedTask){ tasks=tasks.filter(t=>t.id!==linkedTask.id); }
    saveData();closeModal(els.projectModal);render();showToast(editingProjectId?'项目已更新':'项目已创建');editingProjectId=null;editingProjectTaskId=null; }
  function deleteProject(){ const p=projects.find(x=>x.id===editingProjectId); if(!p)return; closeModal(els.projectModal);showConfirm('删除项目',`确定删除「${p.title}」吗？关联待办也会删除。`,()=>{projects=projects.filter(x=>x.id!==p.id);tasks=tasks.filter(t=>t.projectId!==p.id);saveData();render();showToast('项目已删除');editingProjectId=null;}); }

  function openTaskModal(taskId=null){ refreshStageSelects(); editingTaskId=taskId; const t=taskId?tasks.find(x=>x.id===taskId):null; $('taskModalTitle').textContent=t?'编辑待处理事项':'添加待处理事项'; $('deleteTaskBtn').style.visibility=t?'visible':'hidden'; $('taskProjectSelect').value=t?.projectId||projects[0]?.id||''; $('taskEditText').value=t?.text||''; $('taskEditDate').value=t?.date||todayISO; $('taskDeltaInput').value=t?.progressDelta??8; openModal(els.taskModal); }
  function saveTask(){
    const projectId=$('taskProjectSelect').value,text=$('taskEditText').value.trim(),date=$('taskEditDate').value||todayISO,delta=clamp(Number($('taskDeltaInput').value)||0,0,100);
    if(!projectId||!text){showToast('请选择项目并填写事项');return;}
    if(editingTaskId){
      const t=tasks.find(x=>x.id===editingTaskId);
      if(t){
        if(t.contributed){
          const oldProject=projects.find(p=>p.id===t.projectId),newProject=projects.find(p=>p.id===projectId);
          if(oldProject) oldProject.baseProgress=clamp((Number(oldProject.baseProgress)||0)+t.progressDelta,-10000,100);
          if(newProject) newProject.baseProgress=clamp((Number(newProject.baseProgress)||0)-delta,-10000,100);
        }
        Object.assign(t,{projectId,text,date,progressDelta:delta});
      }
    }else{
      tasks.push({id:uid('task'),projectId,text,date,progressDelta:delta,done:false,contributed:false,createdAt:Date.now()});
    }
    saveData();closeModal(els.taskModal);render();showToast('待处理事项已保存');
  }
  function deleteTask(id=editingTaskId){ const t=tasks.find(x=>x.id===id);if(!t)return; const p=projects.find(x=>x.id===t.projectId); if(t.contributed&&p)p.baseProgress=clamp(p.baseProgress+t.progressDelta,0,100); tasks=tasks.filter(x=>x.id!==id);saveData();closeModal(els.taskModal);render();showToast('待处理事项已删除'); }
  function toggleTask(id,checked){ const t=tasks.find(x=>x.id===id);if(!t)return;t.done=checked;t.contributed=checked;saveData();render();showToast(checked?'任务已完成':'任务已恢复'); }

  function renderStageManager(){ $('stageList').innerHTML=stages.map(s=>`<div class="stage-item" draggable="true" data-stage-id="${s.id}"><span class="drag-handle">⋮⋮</span><input class="stage-color" type="color" value="${s.color}" data-stage-color="${s.id}"><input class="stage-name" value="${escapeHTML(s.name)}" data-stage-name="${s.id}"><span class="stage-count">${projects.filter(p=>p.status===s.id).length}个</span><button class="btn danger small" type="button" data-delete-stage="${s.id}" ${stages.length===1?'disabled':''}>删除</button></div>`).join(''); }
  function addStage(){const name=$('newStageName').value.trim(),color=$('newStageColor').value;if(!name){showToast('请输入阶段名称');return;}if(stages.some(s=>s.name===name)){showToast('阶段名称已存在');return;}stages.push({id:uid('stage'),name,color,order:stages.length});$('newStageName').value='';saveData();renderStageManager();refreshStageSelects();render();showToast('阶段已添加');}
  function deleteStage(id){if(stages.length<=1)return;const s=stageById(id),idx=stages.findIndex(x=>x.id===id),fallback=stages[idx===0?1:idx-1],count=projects.filter(p=>p.status===id).length;showConfirm('删除阶段',`确定删除「${s.name}」吗？${count?`其中 ${count} 个项目会转入「${fallback.name}」。`:''}`,()=>{projects.forEach(p=>{if(p.status===id)p.status=fallback.id});stages.splice(idx,1);stages.forEach((x,i)=>x.order=i);saveData();renderStageManager();refreshStageSelects();render();showToast('阶段已删除');});}

  function renderSummary(index){ const period=getPeriod(index),list=sortedProjectsForSelect().filter(p=>parseISO(p.start)<=period.end&&projectEnd(p)>=period.start);$('summaryTitle').textContent=period.title; $('summaryList').innerHTML=list.length?list.map(p=>`<button type="button" class="summary-card" data-summary-project="${p.id}"><strong>${escapeHTML(p.title)}</strong><span>${escapeHTML(stageById(p.status).name)} · ${formatDate(p.start)}开始 · ${p.duration}天 · ${projectProgress(p)}%</span></button>`).join(''):'<div class="summary-card"><strong>暂无项目</strong><span>这个周期没有安排项目。</span></div>';openModal(els.summaryModal); }

  function setScale(scale){ if(!viewStarts[scale])initViewStarts(); currentScale=scale;render();requestAnimationFrame(scrollTodayIntoView);showToast(`已切换为${{day:'日',week:'周',month:'月',year:'年'}[scale]}视图`); }
  function navigateView(direction){ const s=viewStarts[currentScale]; if(currentScale==='day')viewStarts.day=addDays(s,direction*14); else if(currentScale==='week')viewStarts.week=addDays(s,direction*56); else if(currentScale==='month')viewStarts.month=addMonthsSafe(s,direction*6); else viewStarts.year=addYearsSafe(s,direction*3); render(); els.ganttScroll.scrollLeft=0; }
  function resetViewToToday(){initViewStarts();render();requestAnimationFrame(scrollTodayIntoView)}
  function locateProject(id){const p=projects.find(x=>x.id===id);if(!p)return;const d=parseISO(p.start);if(currentScale==='day')viewStarts.day=addDays(d,-3);else if(currentScale==='week')viewStarts.week=addDays(startOfWeek(d),-7);else if(currentScale==='month')viewStarts.month=new Date(d.getFullYear(),Math.max(0,d.getMonth()-2),1);else viewStarts.year=new Date(d.getFullYear()-2,0,1);render();requestAnimationFrame(()=>{const row=document.querySelector(`[data-project="${CSS.escape(id)}"]`);row?.scrollIntoView({block:'nearest'});});}
  function setZoom(value){const sc=els.ganttScroll,oldWidth=sc.scrollWidth,center=sc.scrollLeft+sc.clientWidth/2,ratio=oldWidth?center/oldWidth:0;zoomValue=clamp(Number(value)||74,44,120);document.documentElement.style.setProperty('--unit',zoomValue+'px');els.zoomRange.value=zoomValue;els.zoomText.textContent=Math.round(zoomValue/74*100)+'%';renderTimeline();renderRows();requestAnimationFrame(()=>{sc.scrollLeft=Math.max(0,ratio*sc.scrollWidth-sc.clientWidth/2)});}
  function setVZoom(value){const sc=els.ganttScroll,ratio=sc.scrollHeight?(sc.scrollTop+sc.clientHeight/2)/sc.scrollHeight:0;vZoomValue=clamp(Number(value)||92,82,136);document.documentElement.style.setProperty('--row-h',vZoomValue+'px');els.vZoomRange.value=vZoomValue;els.vZoomText.textContent=Math.round(vZoomValue/92*100)+'%';requestAnimationFrame(()=>{sc.scrollTop=Math.max(0,ratio*sc.scrollHeight-sc.clientHeight/2)});}
  function scrollTodayIntoView(){const idx=unitIndexForDate(todayDate);if(idx<0||idx>=scaleConfig().units)return;const sidebar=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sidebar'))||360;const target=sidebar+idx*zoomValue+zoomValue/2-els.ganttScroll.clientWidth/2;els.ganttScroll.scrollLeft=Math.max(0,target);}

  function beginBarDrag(e,bar){if(e.button!==0||activeDrag)return;const p=projects.find(x=>x.id===bar.dataset.id);if(!p)return;const lane=bar.closest('.project-lane'),range=visibleRange(p);if(range.outside)return;const mode=e.target.dataset.resize?`resize-${e.target.dataset.resize}`:'move';const rect=lane.getBoundingClientRect();const pointerUnit=(e.clientX-rect.left)/zoomValue;activeDrag={pointerId:e.pointerId,bar,lane,project:p,mode,startX:e.clientX,startY:e.clientY,moved:false,originalStart:parseISO(p.start),originalEnd:projectEnd(p),originalStartIndex:unitIndexForDate(parseISO(p.start)),originalEndIndex:unitIndexForDate(projectEnd(p)),grabOffset:pointerUnit-unitIndexForDate(parseISO(p.start)),previewStartIndex:unitIndexForDate(parseISO(p.start)),previewEndIndex:unitIndexForDate(projectEnd(p))};lastPointerX=e.clientX;lastPointerY=e.clientY;bar.setPointerCapture(e.pointerId);bar.classList.add('dragging');document.body.classList.add('is-dragging');e.preventDefault();e.stopPropagation();}
  function updateDragPointer(e){if(!activeDrag||e.pointerId!==activeDrag.pointerId)return;lastPointerX=e.clientX;lastPointerY=e.clientY;if(Math.hypot(e.clientX-activeDrag.startX,e.clientY-activeDrag.startY)>5)activeDrag.moved=true;if(!dragRaf)dragRaf=requestAnimationFrame(dragFrame);}
  function dragFrame(){dragRaf=0;if(!activeDrag)return;const scRect=els.ganttScroll.getBoundingClientRect(),sidebar=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sidebar'))||360;let scrollDelta=0;if(lastPointerX>scRect.right-38)scrollDelta=12;else if(lastPointerX<scRect.left+Math.min(sidebar,scRect.width*.45)+38)scrollDelta=-12;if(scrollDelta)els.ganttScroll.scrollLeft+=scrollDelta;const rect=activeDrag.lane.getBoundingClientRect(),cfg=scaleConfig();let pointerIndex=Math.floor((lastPointerX-rect.left)/zoomValue);let start=activeDrag.originalStartIndex,end=activeDrag.originalEndIndex;if(activeDrag.mode==='move'){const span=end-start;start=Math.round(pointerIndex-activeDrag.grabOffset);start=clamp(start,0,Math.max(0,cfg.units-span-1));end=start+span;}else if(activeDrag.mode==='resize-left'){start=clamp(pointerIndex,0,Math.min(end,cfg.units-1));}else{end=clamp(pointerIndex,Math.max(0,start),cfg.units-1);}activeDrag.previewStartIndex=start;activeDrag.previewEndIndex=end;activeDrag.bar.style.left=(start*zoomValue)+'px';activeDrag.bar.style.width=Math.max(zoomValue,(end-start+1)*zoomValue)+'px';if(activeDrag.moved&&scrollDelta)dragRaf=requestAnimationFrame(dragFrame);}
  function finishBarDrag(e,cancel=false){if(!activeDrag||e.pointerId!==activeDrag.pointerId)return;const d=activeDrag;try{d.bar.releasePointerCapture(d.pointerId)}catch{}d.bar.classList.remove('dragging');document.body.classList.remove('is-dragging');if(dragRaf){cancelAnimationFrame(dragRaf);dragRaf=0;}activeDrag=null;if(cancel){renderRows();return;}if(!d.moved){openEditProject(d.project.id);return;}if(d.mode==='move'){const delta=d.previewStartIndex-d.originalStartIndex;d.project.start=toISO(shiftByUnits(d.originalStart,delta));}else if(d.mode==='resize-left'){const newStart=unitStart(d.previewStartIndex);if(newStart<=d.originalEnd){d.project.start=toISO(newStart);d.project.duration=daysBetween(newStart,d.originalEnd)+1;}}else{const newEnd=unitEnd(d.previewEndIndex);if(newEnd>=d.originalStart)d.project.duration=daysBetween(d.originalStart,newEnd)+1;}d.project.duration=clamp(d.project.duration,1,3650);saveData();render();showToast('项目排期已更新');}

  function resetDemo(){showConfirm('重置演示数据','当前项目、阶段和待办将恢复为5个演示项目。',()=>{applyData(defaultData());currentFilter='all';initViewStarts();saveData();refreshStageSelects();render();requestAnimationFrame(scrollTodayIntoView);showToast('演示数据已重置');});}

  function bindEvents(){
    els.monitor.addEventListener('click',e=>{const b=e.target.closest('[data-filter]');if(!b)return;currentFilter=b.dataset.filter;render();});
    els.rows.addEventListener('click',e=>{const edit=e.target.closest('[data-edit-project]');if(edit){openEditProject(edit.dataset.editProject);return;}const locate=e.target.closest('[data-locate]');if(locate)locateProject(locate.dataset.locate);});
    els.rows.addEventListener('pointerdown',e=>{const bar=e.target.closest('.gantt-bar');if(bar)beginBarDrag(e,bar);});document.addEventListener('pointermove',updateDragPointer);document.addEventListener('pointerup',e=>finishBarDrag(e,false));document.addEventListener('pointercancel',e=>finishBarDrag(e,true));window.addEventListener('blur',()=>{if(activeDrag)finishBarDrag({pointerId:activeDrag.pointerId},true)});
    els.timeline.addEventListener('click',e=>{const c=e.target.closest('[data-period]');if(c)renderSummary(Number(c.dataset.period));});
    els.taskList.addEventListener('change',e=>{const item=e.target.closest('[data-task]');if(item&&e.target.type==='checkbox')toggleTask(item.dataset.task,e.target.checked);});els.taskList.addEventListener('click',e=>{const edit=e.target.closest('[data-edit-task]');if(edit)openTaskModal(edit.dataset.editTask);const del=e.target.closest('[data-delete-task]');if(del)showConfirm('删除待处理事项','确定删除这条待处理事项吗？',()=>deleteTask(del.dataset.deleteTask));});
    $('showAllBtn').addEventListener('click',()=>{currentFilter='all';render()});$('stageBtn').addEventListener('click',()=>{renderStageManager();openModal(els.stageModal)});$('resetBtn').addEventListener('click',resetDemo);$('createBtn').addEventListener('click',openCreateProject);$('quickTaskBtn').addEventListener('click',()=>openTaskModal());
    $('saveProjectBtn').addEventListener('click',saveProject);$('deleteProjectBtn').addEventListener('click',deleteProject);inputs.file.addEventListener('change',()=>{pendingFiles=[...new Set([...pendingFiles,...Array.from(inputs.file.files||[]).map(f=>f.name)])];renderFiles();});inputs.start.addEventListener('change',()=>{if(!editingProjectId){inputs.addTask.checked=inputs.start.value===todayISO;inputs.taskDate.value=inputs.start.value||todayISO;}});
    $('saveTaskBtn').addEventListener('click',saveTask);$('deleteTaskBtn').addEventListener('click',()=>showConfirm('删除待处理事项','确定删除这条待处理事项吗？',()=>deleteTask()));
    $('addStageBtn').addEventListener('click',addStage);$('stageList').addEventListener('input',e=>{const id=e.target.dataset.stageColor||e.target.dataset.stageName,s=stages.find(x=>x.id===id);if(!s)return;if(e.target.dataset.stageColor)s.color=e.target.value;else s.name=e.target.value.trim()||s.name;saveData();refreshStageSelects();render();});$('stageList').addEventListener('click',e=>{const b=e.target.closest('[data-delete-stage]');if(b&&!b.disabled)deleteStage(b.dataset.deleteStage);});
    let dragStageId=null;$('stageList').addEventListener('dragstart',e=>{const item=e.target.closest('.stage-item');if(!item)return;dragStageId=item.dataset.stageId;item.classList.add('dragging');e.dataTransfer.effectAllowed='move'});$('stageList').addEventListener('dragend',e=>{e.target.closest('.stage-item')?.classList.remove('dragging');document.querySelectorAll('.stage-item').forEach(x=>x.classList.remove('drag-over'));dragStageId=null});$('stageList').addEventListener('dragover',e=>{e.preventDefault();const item=e.target.closest('.stage-item');document.querySelectorAll('.stage-item').forEach(x=>x.classList.remove('drag-over'));item?.classList.add('drag-over')});$('stageList').addEventListener('drop',e=>{e.preventDefault();const item=e.target.closest('.stage-item');if(!item||!dragStageId)return;const a=stages.findIndex(x=>x.id===dragStageId),b=stages.findIndex(x=>x.id===item.dataset.stageId);if(a<0||b<0||a===b)return;const [m]=stages.splice(a,1);stages.splice(b,0,m);stages.forEach((x,i)=>x.order=i);saveData();renderStageManager();refreshStageSelects();render();});
    $('summaryList').addEventListener('click',e=>{const b=e.target.closest('[data-summary-project]');if(b){closeModal(els.summaryModal);openEditProject(b.dataset.summaryProject)}});
    els.scaleTabs.addEventListener('click',e=>{const b=e.target.closest('[data-scale]');if(b)setScale(b.dataset.scale)});$('prevViewBtn').addEventListener('click',()=>navigateView(-1));$('nextViewBtn').addEventListener('click',()=>navigateView(1));$('todayViewBtn').addEventListener('click',resetViewToToday);$('zoomOutBtn').addEventListener('click',()=>setZoom(zoomValue-8));$('zoomInBtn').addEventListener('click',()=>setZoom(zoomValue+8));els.zoomRange.addEventListener('input',e=>setZoom(e.target.value));$('vZoomOutBtn').addEventListener('click',()=>setVZoom(vZoomValue-8));$('vZoomInBtn').addEventListener('click',()=>setVZoom(vZoomValue+8));els.vZoomRange.addEventListener('input',e=>setVZoom(e.target.value));
    document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',()=>closeModal($(b.dataset.close))));$('confirmOkBtn').addEventListener('click',()=>{const fn=confirmAction;confirmAction=null;closeModal(els.confirmModal);fn?.()});document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal(m)}));document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(activeDrag){finishBarDrag({pointerId:activeDrag.pointerId},true);return;}const m=modalStack.at(-1);if(m)closeModal(m);}});
    let panning=false,panId=null,panX=0,panScroll=0;els.ganttScroll.addEventListener('pointerdown',e=>{if(e.button!==0||e.target.closest('.gantt-bar,.project-list-card,button,input,select,textarea,label'))return;panning=true;panId=e.pointerId;panX=e.clientX;panScroll=els.ganttScroll.scrollLeft;els.ganttScroll.classList.add('panning');els.ganttScroll.setPointerCapture(panId)});els.ganttScroll.addEventListener('pointermove',e=>{if(panning&&e.pointerId===panId)els.ganttScroll.scrollLeft=panScroll-(e.clientX-panX)});const stopPan=e=>{if(panning&&e.pointerId===panId){panning=false;els.ganttScroll.classList.remove('panning');try{els.ganttScroll.releasePointerCapture(panId)}catch{}panId=null}};els.ganttScroll.addEventListener('pointerup',stopPan);els.ganttScroll.addEventListener('pointercancel',stopPan);
  }

  function init(){initViewStarts();loadData();refreshStageSelects();setZoom(zoomValue);setVZoom(vZoomValue);bindEvents();render();requestAnimationFrame(scrollTodayIntoView);}
  init();
})();
</script>
